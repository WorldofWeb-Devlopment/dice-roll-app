<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <div class="card-1 active">
        <h1 id="player-1">Player 1</h1>
        <p class="score" id="score--1">43</p>
        <div class="score-card">
          <p class="current">Current Score</p>
          <p class="score-1" id="current-score--1">0</p>
        </div>
      </div>
      <div class="card-2 ">
        <h1 id="player-2">Player 2</h1>
        <p class="score" id="score--2"">43</p>
        <div class="score-card">
          <p class="current">Current Score</p>
          <p class="score-2" id="current-score--2">0</p>
        </div>
      </div>
      <div class="btns">
        <button id="new-game">🔄️ New Game</button>
        <img src="1.png" alt="Dice-image"  id="dice-img"/>
        <button id="roll-dice">🎲 Roll Dice</button>
        <button id="hold">📥 Hold</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
